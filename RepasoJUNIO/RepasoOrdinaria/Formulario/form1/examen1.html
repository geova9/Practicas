

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Avanzado</title>
	 <script src="main.js"></script>
</head>
<body>

    <form id="registroForm">

        <h1>Registro de Usuario</h1>

        <!-- Nombre -->
        <div class="grupo">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" placeholder="Ej: Juan Pérez">
            <small class="error"></small>
        </div>

        <!-- Usuario -->
        <div class="grupo">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario">
            <small class="error"></small>
        </div>

        <!-- Contraseña -->
        <div class="grupo">
            <label for="password">Contraseña</label>
            <input type="password" id="password">
            <div class="fuerza">
                <div></div>
            </div>
            <p id="nivelPassword"></p>
            <small class="error"></small>
        </div>

        <!-- Confirmar contraseña -->
        <div class="grupo">
            <label for="confirmar">Confirmar contraseña</label>
            <input type="password" id="confirmar">
            <small class="error"></small>
        </div>

        <!-- Email -->
        <div class="grupo">
            <label for="email">Correo electrónico</label>
            <input type="text" id="email">
            <small class="error"></small>
        </div>

        <!-- Edad -->
        <div class="grupo">
            <label for="edad">Edad</label>
            <input type="text" id="edad">
            <small class="error"></small>
        </div>

        <!-- Teléfono -->
        <div class="grupo">
            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" placeholder="600-123-456">
            <small class="error"></small>
        </div>

        <!-- DNI -->
        <div class="grupo">
            <label for="dni">DNI</label>
            <input type="text" id="dni" placeholder="12345678A">
            <small class="error"></small>
        </div>

        <!-- Código postal -->
        <div class="grupo">
            <label for="cp">Código Postal</label>
            <input type="text" id="cp">
            <small class="error"></small>
        </div>

        <!-- Dirección -->
        <div class="grupo">
            <label for="direccion">Dirección</label>
            <textarea id="direccion" rows="5"></textarea>

            <div>
                Caracteres restantes:
                <span id="contador">120</span>
            </div>

            <small class="error"></small>
        </div>

        <!-- Género -->
        <div class="grupo">
            <p>Género</p>

            <label>
                <input type="radio" name="genero" value="hombre">
                Hombre
            </label>

            <label>
                <input type="radio" name="genero" value="mujer">
                Mujer
            </label>

            <label>
                <input type="radio" name="genero" value="otro">
                Otro
            </label>

            <small class="error"></small>
        </div>

        <!-- Hobbies -->
        <div class="grupo hobbies">

            <p>Hobbies</p>

            <label>
                <input type="checkbox" value="gym">
                Gimnasio
            </label>

            <label>
                <input type="checkbox" value="cine">
                Cine
            </label>

            <label>
                <input type="checkbox" value="anime">
                Anime
            </label>

            <label>
                <input type="checkbox" value="musica">
                Música
            </label>

            <label>
                <input type="checkbox" value="viajes">
                Viajes
            </label>

            <label>
                <input type="checkbox" value="videojuegos">
                Videojuegos
            </label>

            <small class="error"></small>
        </div>

        <!-- País -->
        <div class="grupo">
            <label for="pais">País</label>

            <select id="pais">
                <option value="">Selecciona un país</option>
                <option value="espana">España</option>
                <option value="francia">Francia</option>
                <option value="italia">Italia</option>
                <option value="alemania">Alemania</option>
                <option value="otro">Otro</option>
            </select>

            <small class="error"></small>
        </div>

        <!-- Provincia -->
        <div class="grupo oculto">
            <label for="provincia">Provincia</label>

            <select id="provincia">
                <option value="">Selecciona provincia</option>
                <option>Madrid</option>
                <option>Barcelona</option>
                <option>Toledo</option>
                <option>Sevilla</option>
                <option>Valencia</option>
            </select>

            <small class="error"></small>
        </div>

        <!-- Tarjeta -->
        <div class="grupo">
            <label for="tarjeta">Tarjeta bancaria</label>
            <input type="text" id="tarjeta" placeholder="1234 5678 9012 3456">
            <small class="error"></small>
        </div>

        <!-- Términos -->
        <div class="grupo">
            <label>
                <input type="checkbox" id="terminos">
                Acepto los términos y condiciones
            </label>

            <small class="error"></small>
        </div>

        <!-- Botón -->
        <button type="submit" id="enviar">
            Registrarse
        </button>

        <!-- Mensaje final -->
        <p id="mensajeFinal"></p>

    </form>

   

</body>
</html>
